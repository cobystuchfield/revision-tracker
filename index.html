<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Revision Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="app">

  <!-- Sidebar -->
  <nav id="sidebar">
    <div class="sidebar-top">
      <div class="logo">RT</div>
      <div class="nav-links">
        <button class="nav-btn active" data-page="dashboard">
          <span class="nav-icon">◈</span>
          <span>Dashboard</span>
        </button>
        <button class="nav-btn" data-page="eod">
          <span class="nav-icon">◉</span>
          <span>EOD Log</span>
        </button>
        <button class="nav-btn" data-page="history">
          <span class="nav-icon">◎</span>
          <span>History</span>
        </button>
        <button class="nav-btn" data-page="gaps">
          <span class="nav-icon">◐</span>
          <span>Gaps</span>
        </button>
        <button class="nav-btn" data-page="papers">
          <span class="nav-icon">◫</span>
          <span>Past Papers</span>
        </button>
        <button class="nav-btn" data-page="settings">
          <span class="nav-icon">◌</span>
          <span>Settings</span>
        </button>
      </div>
    </div>
    <div class="sidebar-bottom">
      <div class="streak-badge">
        <span class="streak-fire">▲</span>
        <span id="streak-count">0</span>
        <span class="streak-label">day streak</span>
      </div>
    </div>
  </nav>

  <!-- Main content -->
  <main id="main">

    <!-- Top bar -->
    <header id="topbar">
      <div class="page-title" id="page-title">Dashboard</div>
      <div class="next-exam-badge" id="next-exam-badge">
        <span class="next-exam-label">Next exam</span>
        <span id="next-exam-name">—</span>
        <span id="next-exam-days" class="next-exam-days">—</span>
      </div>
    </header>

    <!-- Pages -->
    <div id="page-dashboard" class="page active"></div>
    <div id="page-eod" class="page"></div>
    <div id="page-history" class="page"></div>
    <div id="page-gaps" class="page"></div>
    <div id="page-papers" class="page"></div>
    <div id="page-settings" class="page"></div>

  </main>
</div>

<script src="js/data.js"></script>
<script src="js/store.js"></script>
<script src="js/dashboard.js"></script>
<script src="js/eod.js"></script>
<script src="js/history.js"></script>
<script src="js/gaps.js"></script>
<script src="js/papers.js"></script>
<script src="js/settings.js"></script>
<script src="js/app.js"></script>
</body>
</html>
